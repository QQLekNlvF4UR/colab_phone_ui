<!doctype html>
<html>
<head>
  <title>Colab GPU Phone Lab</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      background: #101010;
      color: #eaeaea;
      font-family: monospace;
      padding: 18px;
      max-width: 800px;
      margin: auto;
    }

    textarea, input, button {
      width: 100%;
      box-sizing: border-box;
      font-size: 18px;
      margin-top: 12px;
      padding: 14px;
      border-radius: 10px;
      border: none;
    }

    button {
      background: #39ff14;
      color: black;
      font-weight: bold;
    }

    pre {
      background: #1e1e1e;
      padding: 16px;
      border-radius: 10px;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }
  </style>
</head>

<body>
  <h1>⚡ Phone → Codespaces → Colab GPU</h1>

  <p>This HTML page is served by Node/Express. The heavy work runs on Colab GPU.</p>

  <label>Prompt</label>
  <textarea id="prompt" rows="5">build me a weird AI barracks tool</textarea>

  <label>GPU Power: <span id="powerLabel">2</span></label>
  <input id="power" type="range" min="1" max="6" value="2"
         oninput="powerLabel.textContent = this.value">

  <button onclick="runGPU()">RUN COLAB GPU</button>

  <h2>Output</h2>
  <pre id="output">Waiting...</pre>

  <script>
    async function runGPU() {
      const output = document.getElementById("output");

      output.textContent = "Calling Colab GPU backend...";

      const res = await fetch("/api/gpu", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          prompt: document.getElementById("prompt").value,
          power: document.getElementById("power").value
        })
      });

      const data = await res.json();

      if (data.ok) {
        output.textContent = data.result;
      } else {
        output.textContent = "ERROR:\n" + data.error;
      }
    }
  </script>
</body>
</html>
